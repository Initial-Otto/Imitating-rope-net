<svg width="150" height="50" viewBox="0 0 150 50"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <!-- 粉色渐变 -->
        <linearGradient id="miniPink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffb6c1"/>
            <stop offset="50%" stop-color="#ff69b4"/>
            <stop offset="100%" stop-color="#ff1493"/>
        </linearGradient>

        <!-- 浅粉色渐变 -->
        <linearGradient id="miniLightPink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff0f5"/>
            <stop offset="100%" stop-color="#ffe4e1"/>
        </linearGradient>

        <!-- 深粉色渐变 -->
        <linearGradient id="miniDarkPink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#db7093"/>
            <stop offset="100%" stop-color="#c71585"/>
        </linearGradient>

        <!-- 柔和发光效果 -->
        <filter id="miniGlowPink" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
            <feFlood flood-color="#ffb6c1" flood-opacity="0.6" result="color"/>
            <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- 心形图案 -->
        <path id="heart" d="M12,4.419c-2.826-5.695-11.999-4.064-11.999,3.27c0,7.134,9.943,10.243,11.999,15.73
            c2.057-5.487,12-8.596,12-15.73C24,0.355,14.826-1.276,12,4.419z"/>

        <!-- 云朵图案 -->
        <path id="cloud" d="M18.92,12.38c-0.34-2.12-2.21-3.76-4.42-3.76c-2.21,0-4.07,1.64-4.42,3.76
            c-1.55,0.59-2.66,2.08-2.66,3.87c0,2.23,1.81,4.04,4.04,4.04h7.04c2.23,0,4.04-1.81,4.04-4.04
            C21.58,14.46,20.47,12.97,18.92,12.38z"/>
    </defs>

    <!-- 浅粉色背景 -->
    <rect width="100%" height="100%" fill="#fff0f5" rx="8" ry="8"/>

    <!-- 可爱森林图形 - 向左移动，为文字腾出空间 -->
    <g id="miniForest" transform="translate(0, 15)" filter="url(#miniGlowPink)">
        <!-- 圆润可爱的树木 -->
        <path d="M5,25 Q5,10 10,5 Q15,0 20,5 Q25,10 25,25 Z" fill="url(#miniPink)" opacity="0.9"/>
        <path d="M25,25 Q25,8 32,3 Q39,0 45,3 Q52,8 52,25 Z" fill="url(#miniPink)" opacity="0.9"/>

        <!-- 树木装饰（心形和圆点） -->
        <use xlink:href="#heart" x="12" y="8" width="5" height="5" fill="#ffffff" opacity="0.8"/>
        <use xlink:href="#heart" x="35" y="5" width="5" height="5" fill="#ffffff" opacity="0.8"/>

        <circle cx="12" cy="20" r="1.2" fill="#ffffff"/>
        <circle cx="22" cy="15" r="1.2" fill="#ffffff"/>
        <circle cx="35" cy="18" r="1.2" fill="#ffffff"/>
        <circle cx="45" cy="12" r="1.2" fill="#ffffff"/>
    </g>

    <!-- 可爱网络结构（改为花朵形状） - 向左移动 -->
    <g id="miniNetwork" transform="translate(50, 15)" opacity="0.9">
        <!-- 花朵形状网络 -->
        <circle cx="20" cy="15" r="6" fill="none" stroke="url(#miniDarkPink)" stroke-width="1.2" stroke-dasharray="2,1"/>

        <!-- 花瓣 -->
        <circle cx="20" cy="9" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>
        <circle cx="26" cy="12" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>
        <circle cx="26" cy="18" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>
        <circle cx="20" cy="21" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>
        <circle cx="14" cy="18" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>
        <circle cx="14" cy="12" r="3" fill="url(#miniLightPink)" stroke="url(#miniDarkPink)" stroke-width="0.4"/>

        <!-- 中心节点（改为心形） -->
        <use xlink:href="#heart" x="16" y="11" width="7" height="7" fill="url(#miniPink)" filter="url(#miniGlowPink)"/>
    </g>

    <!-- 可爱文字 - 向左移动，确保完整显示 -->
    <g id="miniText" text-anchor="start" font-family="'Comic Sans MS', 'Marker Felt', 'Microsoft YaHei', sans-serif">
        <text x="85" y="22" font-size="14" font-weight="bold" fill="url(#miniDarkPink)">
            森网
        </text>
        <text x="85" y="35" font-size="8" fill="url(#miniDarkPink)" opacity="0.9">
            SENWANG
        </text>
    </g>

    <!-- 装饰元素（改为云朵和星星） - 调整位置 -->
    <g opacity="0.8">
        <!-- 云朵装饰 -->
        <use xlink:href="#cloud" x="5" y="38" width="10" height="6" fill="url(#miniLightPink)"/>

        <!-- 星星装饰 -->
        <polygon points="140,15 142,19 147,20 144,23 145,28 140,25 135,28 136,23 133,20 138,19"
                 fill="url(#miniPink)" opacity="0.7">
            <animateTransform attributeName="transform" type="rotate" from="0 140 20" to="360 140 20" dur="8s" repeatCount="indefinite"/>
        </polygon>

        <!-- 飘动的小心形 -->
        <use xlink:href="#heart" x="25" y="40" width="3.5" height="3.5" fill="url(#miniPink)" opacity="0.6">
            <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
        </use>
    </g>

    <!-- 边框装饰 -->
    <rect x="2" y="2" width="146" height="46" rx="6" ry="6"
          fill="none" stroke="url(#miniPink)" stroke-width="1" stroke-dasharray="3,2"/>
</svg>